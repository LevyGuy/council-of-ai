name = "council-of-ai"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "council-of-ai"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
# Replace these with your actual values before deploying.
# Non-secret config lives here; API keys go in via `wrangler secret put`.
AUTH0_DOMAIN    = "REPLACE_WITH_YOUR_AUTH0_DOMAIN"    # e.g. your-tenant.us.auth0.com
AUTH0_CLIENT_ID = "REPLACE_WITH_YOUR_AUTH0_CLIENT_ID" # e.g. Z9pXFtSBrPCF4QthinP8KIiiX7EaCKaH
ALLOWED_ORIGIN  = "REPLACE_WITH_YOUR_DREAMHOST_DOMAIN" # e.g. https://yoursite.com

# Secrets set via CLI (never commit these):
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put GOOGLE_API_KEY
#   wrangler secret put XAI_API_KEY
