<script>
    // ── DOM refs ──────────────────────────────────────────────────
    const output    = document.querySelector('.main-text');
    const input     = document.getElementById('query-input');
    const sendBtn   = document.getElementById('send-btn');

    console.log('[council] DOM refs:', {output: !!output, input: !!input, sendBtn: !!sendBtn});

    let currentTurnEl = null;
    let sessionActive = false;

    // ── Avatar focus ──────────────────────────────────────────────
    function setSpeaking(modelKey) {
        document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('speaking'));
        if (modelKey) {
            const card = document.querySelector(`.avatar-card[data-model="${modelKey}"]`);
            if (card) card.classList.add('speaking');
        }
    }

    // ── Model color map (matches display.py MODEL_COLORS order) ──
    const MODEL_COLORS = {
        0: '#06b6d4', // cyan
        1: '#22c55e', // green
        2: '#d946ef', // magenta
        3: '#eab308', // yellow
    };
    let modelColorMap = {};

    // ── Submit query ──────────────────────────────────────────────
    function submitQuery() {
        const query = input.value.trim();
        if (!query || sessionActive) return;

        sessionActive = true;
        input.disabled = true;
        sendBtn.disabled = true;
        input.value = '';
        output.innerHTML = '';
        currentTurnEl = null;
        setSpeaking(null);

        streamSession(query);
    }

    sendBtn.addEventListener('click', submitQuery);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') submitQuery();
    });

    // ── SSE Stream ────────────────────────────────────────────────
    async function streamSession(query) {
        console.log('[council] Starting session, query:', query);
        try {
            const resp = await fetch('/api/session', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query}),
            });
            console.log('[council] Response status:', resp.status);

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                const raw = decoder.decode(value, {stream: true});
                buffer += raw;

                // Normalize \r\n to \n, then split SSE events on blank lines
                buffer = buffer.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                const parts = buffer.split('\n\n');
                buffer = parts.pop(); // keep incomplete part

                for (const part of parts) {
                    // Collect all data: lines in this SSE event block
                    let dataStr = '';
                    for (const line of part.split('\n')) {
                        const trimmed = line.trim();
                        if (trimmed.startsWith('data:')) {
                            dataStr += trimmed.substring(5).trim();
                        }
                    }
                    if (dataStr) {
                        try {
                            const event = JSON.parse(dataStr);
                            console.log('[council] Event:', event.type, event);
                            handleEvent(event);
                        } catch (parseErr) {
                            console.warn('[council] Parse error:', dataStr, parseErr);
                        }
                    }
                }
            }
        } catch (err) {
            console.error('[council] Stream error:', err);
            const errEl = document.createElement('div');
            errEl.className = 'text-red-500 text-sm mt-4';
            errEl.textContent = 'Connection error: ' + err.message;
            output.appendChild(errEl);
        } finally {
            sessionActive = false;
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
            setSpeaking(null);
            console.log('[council] Session ended');
        }
    }

    // ── Event handler ─────────────────────────────────────────────
    function handleEvent(event) {
        switch (event.type) {
            case 'session_start': {
                // Build color map from panel order
                event.models.forEach((m, i) => {
                    modelColorMap[m.key] = MODEL_COLORS[i] || '#94a3b8';
                });
                break;
            }

            case 'iteration': {
                const sep = document.createElement('div');
                sep.className = 'flex items-center gap-3 my-4';
                sep.innerHTML =
                    '<div class="h-px flex-grow bg-gray-200"></div>' +
                    `<span class="text-[9px] font-headline tracking-[0.3em] uppercase text-gray-400 font-bold">Iteration ${event.number} / ${event.max}</span>` +
                    '<div class="h-px flex-grow bg-gray-200"></div>';
                output.appendChild(sep);
                output.scrollTop = output.scrollHeight;
                break;
            }

            case 'speaker': {
                setSpeaking(event.model_key);
                const color = modelColorMap[event.model_key] || '#64748b';

                // Header
                const header = document.createElement('div');
                header.className = 'font-headline text-xs font-bold tracking-wider uppercase mt-5 mb-1';
                header.style.color = color;
                header.textContent = `${event.name} \u2014 ${event.role}`;
                output.appendChild(header);

                // Streaming text container
                currentTurnEl = document.createElement('div');
                currentTurnEl.className = 'turn-content mb-4 whitespace-pre-wrap';
                output.appendChild(currentTurnEl);
                output.scrollTop = output.scrollHeight;
                break;
            }

            case 'chunk': {
                if (currentTurnEl) {
                    currentTurnEl.textContent += event.text;
                    output.scrollTop = output.scrollHeight;
                }
                break;
            }

            case 'turn_end': {
                if (currentTurnEl && event.html) {
                    currentTurnEl.className = 'turn-content mb-4 prose prose-sm max-w-none';
                    currentTurnEl.innerHTML = event.html;
                    output.scrollTop = output.scrollHeight;
                }
                break;
            }

            case 'error': {
                const errEl = document.createElement('div');
                errEl.className = 'text-red-400 text-xs my-2 italic';
                errEl.textContent = `${event.model} skipped: ${event.message}`;
                output.appendChild(errEl);
                break;
            }

            case 'done': {
                setSpeaking(null);
                const footer = document.createElement('div');
                footer.className = 'flex items-center gap-3 mt-6 mb-2';
                footer.innerHTML =
                    '<div class="h-px flex-grow bg-green-200"></div>' +
                    `<span class="text-[9px] font-headline tracking-[0.3em] uppercase text-green-600 font-bold">Session complete \u2014 ${event.iterations} iteration(s)</span>` +
                    '<div class="h-px flex-grow bg-green-200"></div>';
                output.appendChild(footer);
                output.scrollTop = output.scrollHeight;
                break;
            }
        }
    }
</script>
